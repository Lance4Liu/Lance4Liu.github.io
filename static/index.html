<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小柳飞刀 · Personal Homepage</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:ital,wght@0,400;0,600;0,700;1,700&family=Noto+Sans+SC:wght@400;500;700;900&family=Bebas+Neue&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --red:#c8150a;--red2:#ff2010;--green:#39ff7e;
  --bg:#080404;--white:#f2eeee;--gold:#d4a820;
}
html,body,#root{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--white);}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideRight{from{transform:translateX(-30px)}to{transform:translateX(0)}}
@keyframes slideUp{from{transform:translateY(20px)}to{transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}
@keyframes cardIn{from{transform:translateX(55px)}to{transform:translateX(0)}}

/* Scrollbar */
::-webkit-scrollbar{width:4px;background:#1a0000}
::-webkit-scrollbar-thumb{background:var(--red)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ========= BACKGROUND ========= */
const Background = () => (
  <div style={{position:'fixed',inset:0,zIndex:0,overflow:'hidden',pointerEvents:'none'}}>
    {/* Raw background image, no overlays or post effects */}
    <img src="images/bg/hero-bg.png"
      style={{
        position:'absolute',inset:0,width:'100%',height:'100%',
        objectFit:'cover',objectPosition:'center',
      }}/>
  </div>
);

/* ========= ICONS (SVG) ========= */
const NavIcons = {
  home: <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>,
  user: <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>,
  clock: <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm.5 10.8l-3.3 2-.5-.8 3-1.8V7h1v5.8z"/></svg>,
  link: <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M3.9 12c0-1.7 1.4-3.1 3.1-3.1h4V7H7C4.2 7 2 9.2 2 12s2.2 5 5 5h4v-1.9H7c-1.7 0-3.1-1.4-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.7 0 3.1 1.4 3.1 3.1s-1.4 3.1-3.1 3.1h-4V17h4c2.8 0 5-2.2 5-5s-2.2-5-5-5z"/></svg>,
  msg: <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>,
  search: <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>,
  moon: <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/></svg>,
  sun: <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2v-2H2v2zm18 0h2v-2h-2v2zM11 2v2h2V2h-2zm0 18v2h2v-2h-2zM5.99 4.58l-1.42 1.42 1.41 1.41 1.42-1.42L5.99 4.58zm12.02 12.01l-1.41-1.41-1.42 1.42 1.41 1.41 1.42-1.42zM5.99 19.42l1.41-1.41-1.42-1.42-1.41 1.41 1.42 1.42zM18.01 4.58l-1.42 1.42 1.42 1.41 1.42-1.41-1.42-1.42z"/></svg>,
  github: <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>,
  mail: <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>,
  twitter: <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M23 3a10.9 10.9 0 0 1-3.14 1.53 4.48 4.48 0 0 0-7.86 3v1A10.66 10.66 0 0 1 3 4s-4 9 5 13a11.64 11.64 0 0 1-7 2c9 5 20 0 20-11.5a4.5 4.5 0 0 0-.08-.83A7.72 7.72 0 0 0 23 3z"/></svg>,
  linkedin: <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6zM2 9h4v12H2z"/><circle cx="4" cy="4" r="2"/></svg>,
};

/* ========= MENU CARD ICONS ========= */
const HatIcon = () => <img src="images/icons/icon1.png" style={{width:'100%',height:'100%',objectFit:'contain'}}/>;

const BurstIcon = () => <img src="images/icons/icon2.png" style={{width:'100%',height:'100%',objectFit:'contain',filter:'invert(1)'}}/>;

const CrosshairIcon = () => <img src="images/icons/icon3.png" style={{width:'100%',height:'100%',objectFit:'contain',filter:'invert(1)'}}/>;

const BookIcon = () => <img src="images/icons/icon4.png" style={{width:'100%',height:'100%',objectFit:'contain'}}/>;

const SwordIcon = () => <img src="images/icons/icon5.png" style={{width:'100%',height:'100%',objectFit:'contain',filter:'invert(1)'}}/>;

/* ========= NAV BAR ========= */
const NavBar = ({ currentPage, onNav, searchOpen, setSearchOpen, darkMode, setDarkMode }) => {
  const navItems = [
    { id:'home', label:'首页', icon: NavIcons.home },
    { id:'about', label:'关于我', icon: NavIcons.user },
    { id:'timeline', label:'时间轴', icon: NavIcons.clock },
    { id:'links', label:'友链', icon: NavIcons.link },
    { id:'guestbook', label:'留言板', icon: NavIcons.msg },
  ];
  const [hovered, setHovered] = useState(null);

  return (
    <nav style={{
      position:'fixed',top:0,left:0,right:0,zIndex:100,
      display:'flex',alignItems:'center',justifyContent:'center',
      padding:'0 40px',height:'54px',
      background: darkMode ? 'rgba(8,4,4,0.85)' : 'rgba(240,230,228,0.92)',
      backdropFilter:'blur(10px)',
      borderBottom: `1px solid rgba(200,21,10,0.3)`,
    }}>
      {/* Nav items */}
      <div style={{display:'flex',gap:4,alignItems:'center'}}>
        {navItems.map(item=>{
          const active = currentPage === item.id;
          const isHov = hovered === item.id;
          return (
            <button key={item.id}
              onClick={()=>onNav(item.id)}
              onMouseEnter={()=>setHovered(item.id)}
              onMouseLeave={()=>setHovered(null)}
              style={{
                display:'flex',alignItems:'center',gap:5,
                padding:'6px 14px',
                background: active ? 'var(--red)' : isHov ? 'rgba(200,21,10,0.15)' : 'transparent',
                border: active ? '1px solid var(--red)' : '1px solid transparent',
                color: active ? 'white' : darkMode ? 'rgba(242,238,238,0.85)' : '#2a0a0a',
                cursor:'pointer',fontFamily:"'Noto Sans SC',sans-serif",fontSize:13,fontWeight:500,
                transition:'all 0.15s',
                clipPath: active ? 'polygon(0 0,100% 0,97% 100%,3% 100%)' : 'none',
              }}>
              <span style={{opacity:0.9,display:'flex',alignItems:'center'}}>{item.icon}</span>
              {item.label}
            </button>
          );
        })}
      </div>

      {/* Right icons */}
      <div style={{position:'absolute',right:40,display:'flex',gap:10,alignItems:'center'}}>
        <button onClick={()=>setSearchOpen(!searchOpen)}
          style={{background:'none',border:'none',color:darkMode?'var(--white)':'#2a0a0a',cursor:'pointer',
            padding:6,display:'flex',opacity:searchOpen?1:0.7,transition:'all 0.15s',
          }}
          onMouseEnter={e=>e.currentTarget.style.opacity='1'}
          onMouseLeave={e=>e.currentTarget.style.opacity=searchOpen?'1':'0.7'}>
          {NavIcons.search}
        </button>
        <button onClick={()=>setDarkMode(!darkMode)}
          style={{background:'none',border:'none',color:darkMode?'var(--white)':'#2a0a0a',cursor:'pointer',
            padding:6,display:'flex',opacity:0.7,transition:'all 0.2s',
          }}
          onMouseEnter={e=>{e.currentTarget.style.opacity='1';e.currentTarget.style.transform='rotate(20deg)'}}
          onMouseLeave={e=>{e.currentTarget.style.opacity='0.7';e.currentTarget.style.transform='rotate(0)'}}>
          {darkMode ? NavIcons.moon : NavIcons.sun}
        </button>
      </div>
    </nav>
  );
};

/* ========= SEARCH OVERLAY ========= */
const SearchOverlay = ({ onClose, darkMode }) => {
  const [q, setQ] = useState('');
  const inputRef = useRef(null);
  useEffect(()=>{ inputRef.current?.focus(); },[]);
  const results = ['Persona 5 风格设计','个人博客搭建','技术思考笔记','产品设计逻辑','生活日志2024'].filter(r=>q&&r.includes(q));
  return (
    <div style={{
      position:'fixed',inset:0,zIndex:200,
      background:'rgba(5,2,2,0.92)',backdropFilter:'blur(12px)',
      display:'flex',flexDirection:'column',alignItems:'center',paddingTop:160,
      animation:'fadeIn 0.2s ease',
    }} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{width:'min(600px,90vw)'}}>
        <div style={{
          display:'flex',alignItems:'center',gap:12,
          borderBottom:`2px solid var(--red)`,
          padding:'10px 0',marginBottom:20,
        }}>
          <span style={{color:'var(--red)',display:'flex'}}>{NavIcons.search}</span>
          <input ref={inputRef} value={q} onChange={e=>setQ(e.target.value)}
            placeholder="搜索内容..."
            style={{
              background:'none',border:'none',outline:'none',
              color:'white',fontSize:24,flex:1,
              fontFamily:"'Noto Sans SC',sans-serif",
            }}/>
          <button onClick={onClose} style={{background:'none',border:'none',color:'rgba(255,255,255,0.5)',
            fontSize:24,cursor:'pointer',lineHeight:1}}>✕</button>
        </div>
        {q==='' && <p style={{color:'rgba(255,255,255,0.3)',fontFamily:"'Noto Sans SC'",fontSize:13}}>输入关键词开始搜索…</p>}
        {results.map((r,i)=>(
          <div key={i} style={{
            padding:'12px 16px',marginBottom:6,
            background:'rgba(200,21,10,0.08)',
            border:'1px solid rgba(200,21,10,0.25)',
            cursor:'pointer',transition:'all 0.15s',
            fontFamily:"'Noto Sans SC'",fontSize:15,
            clipPath:'polygon(0 0,100% 0,99% 100%,1% 100%)',
          }}
          onMouseEnter={e=>e.currentTarget.style.background='rgba(200,21,10,0.22)'}
          onMouseLeave={e=>e.currentTarget.style.background='rgba(200,21,10,0.08)'}>
            {r}
          </div>
        ))}
        {q && results.length===0 && <p style={{color:'rgba(255,255,255,0.3)',fontFamily:"'Noto Sans SC'",fontSize:13}}>没有找到相关内容</p>}
      </div>
    </div>
  );
};

/* ========= MENU CARD ========= */
const MenuCard = ({ icon, iconEl, en1, en2, cn, desc, sideEl, onClick, delay, darkMode }) => {
  const [hov, setHov] = useState(false);
  return (
    <div onClick={onClick}
      onMouseEnter={()=>setHov(true)}
      onMouseLeave={()=>setHov(false)}
      style={{
        display:'flex',alignItems:'stretch',
        border:`2px solid ${hov?'var(--red2)':'rgba(255,255,255,0.85)'}`,
        background: hov ? 'rgba(180,15,5,0.22)' : darkMode ? 'rgba(8,3,3,0.88)' : 'rgba(240,228,225,0.9)',
        cursor:'pointer',
        clipPath:'polygon(0 0,100% 0,98.5% 100%,1.5% 100%)',
        transition:'all 0.2s',
        transform: hov ? 'translateX(6px) scaleY(1.015)' : 'translateX(0) scaleY(1)',
        boxShadow: hov ? '4px 4px 0 var(--red),inset 0 0 30px rgba(200,21,10,0.1)' : 'none',
        animation:`cardIn 0.5s ${delay}ms both ease-out`,
        position:'relative',overflow:'hidden',
        minHeight:88,
      }}>
      {/* Shimmer on hover */}
      {hov && <div style={{position:'absolute',inset:0,background:'linear-gradient(105deg,transparent 40%,rgba(255,255,255,0.04) 50%,transparent 60%)',pointerEvents:'none'}}/>}
      {/* Icon area */}
      <div style={{
        width:86,flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',
        background: hov ? 'rgba(180,10,5,0.4)' : 'rgba(180,10,5,0.25)',
        borderRight:`2px solid ${hov?'rgba(255,40,20,0.6)':'rgba(255,255,255,0.3)'}`,
        clipPath:'polygon(0 0,100% 0,78% 100%,0 100%)',
        paddingRight:10,
        transition:'all 0.2s',
      }}>
        <div style={{width:56,height:56}}>{iconEl}</div>
      </div>
      {/* Text area */}
      <div style={{flex:1,padding:'10px 16px',display:'flex',flexDirection:'column',justifyContent:'center',minWidth:0}}>
        <div style={{display:'flex',alignItems:'baseline',gap:10,flexWrap:'wrap'}}>
          <span style={{
            fontFamily:"'Oswald',sans-serif",fontWeight:700,fontStyle:'italic',
            fontSize: en2 ? 26 : 32,
            color: hov ? 'white' : darkMode ? 'var(--white)' : '#1a0505',
            lineHeight:1.1,letterSpacing:1,
            transition:'color 0.2s',
            textShadow: hov ? '0 0 20px rgba(255,255,255,0.3)' : 'none',
          }}>
            {en1}{en2 && <><br/>{en2}</>}
          </span>
          <span style={{
            fontSize:11,fontWeight:700,
            fontFamily:"'Noto Sans SC',sans-serif",
            color:'white',
            background:'rgba(200,21,10,0.85)',
            padding:'2px 7px',
            border:'1px solid rgba(255,255,255,0.4)',
            letterSpacing:1,flexShrink:0,
          }}>{cn}</span>
        </div>
        <p style={{
          fontFamily:"'Noto Sans SC',sans-serif",fontSize:11.5,
          color: darkMode ? 'rgba(242,238,238,0.55)' : 'rgba(30,5,5,0.6)',
          marginTop:4,letterSpacing:0.5,
        }}>{desc}</p>
      </div>
      {/* Arrow */}
      <div style={{
        display:'flex',alignItems:'center',paddingRight:14,paddingLeft:8,
        color: hov ? 'var(--red2)' : 'rgba(255,255,255,0.3)',
        fontSize:18,transition:'all 0.2s',
        transform: hov ? 'translateX(4px)' : 'none',
      }}>›</div>
      {/* Side decoration */}
      {sideEl && (
        <div style={{width:36,display:'flex',alignItems:'center',justifyContent:'center',
          paddingRight:8,opacity:0.7}}>
          {sideEl}
        </div>
      )}
    </div>
  );
};

/* ========= TAROT CARD ========= */
const TarotCard = ({ onClick, darkMode }) => {
  const [hov, setHov] = useState(false);
  return (
    <div onClick={onClick}
      onMouseEnter={()=>setHov(true)}
      onMouseLeave={()=>setHov(false)}
      style={{
        width:92,
        border:`2px solid ${hov?'var(--red2)':'rgba(255,255,255,0.6)'}`,
        background: darkMode ? 'rgba(8,3,3,0.9)' : 'rgba(240,228,225,0.95)',
        cursor:'pointer',
        transition:'all 0.25s',
        transform: hov ? 'scale(1.06) rotate(-1deg)' : 'rotate(-2deg)',
        boxShadow: hov ? '0 0 20px rgba(200,21,10,0.6),4px 4px 0 var(--red)' : '3px 3px 8px rgba(0,0,0,0.5)',
        overflow:'hidden',
        clipPath:'polygon(4% 0,96% 0,100% 4%,100% 96%,96% 100%,4% 100%,0 96%,0 4%)',
      }}>
      <img src="images/icons/tarot.png" style={{width:'100%',display:'block',objectFit:'contain'}}/>
    </div>
  );
};

/* ========= CHARACTER ART ========= */
const CharacterArea = ({ darkMode }) => (
  <div style={{
    position:'absolute',
    bottom:44,      /* above footer */
    left:'-2%',
    width:'52%',
    height:'calc(100% - 54px)',   /* below nav */
    display:'flex',alignItems:'flex-end',justifyContent:'flex-start',
    pointerEvents:'none',zIndex:2,
    overflow:'visible',
  }}>
    {/* Soft red glow behind character */}
    <div style={{
      position:'absolute',bottom:'5%',left:'30%',transform:'translateX(-50%)',
      width:'55%',height:'60%',
      background:'radial-gradient(ellipse, rgba(180,10,5,0.35) 0%, transparent 70%)',
      filter:'blur(40px)',
    }}/>
    {/* Hero character image removed per latest asset update */}
  </div>
);

/* ========= HOME PAGE ========= */
const HomePage = ({ onNav, darkMode }) => {
  const cards = [
    { id:'profile', en1:'Profile', cn:'个人简历', desc:'了解我的经历、技能与成就', iconEl:<HatIcon/>, delay:100 },
    { id:'techblog', en1:'Tech', en2:'Blog', cn:'技术博客', desc:'记录技术思考与实践', iconEl:<BurstIcon/>, sideEl:<SwordIcon/>, delay:200 },
    { id:'product', en1:'Product', en2:'Thinking', cn:'产品思考', desc:'探索产品设计与商业逻辑', iconEl:<CrosshairIcon/>, delay:300 },
    { id:'diary', en1:'Diary', cn:'个人日志', desc:'记录生活、灵感与成长', iconEl:<BookIcon/>, delay:400 },
  ];

  return (
    <div style={{
      position:'relative',zIndex:1,width:'100%',height:'100%',
      paddingTop:54,display:'flex',
    }}>
      <CharacterArea darkMode={darkMode}/>

      {/* ===== LEFT TEXT OVERLAYS ===== */}
      {/* Logo */}
      <div style={{
        position:'absolute',top:58,left:16,zIndex:10,
      }}>
        <img src="images/logo/title-logo.png"
          style={{width:260,height:'auto',display:'block',
            filter:'drop-shadow(0 2px 8px rgba(0,0,0,0.6))',
          }}/>
      </div>

      {/* Quote box */}
      <div style={{
        position:'absolute',top:248,left:28,zIndex:10,
        borderLeft:`3px solid var(--red)`,
        padding:'8px 14px',
        background: darkMode ? 'rgba(8,3,3,0.75)' : 'rgba(240,228,225,0.85)',
        animation:'slideRight 0.5s 0.15s both ease',
        maxWidth:200,
      }}>
        <p style={{
          fontFamily:"'Noto Sans SC',sans-serif",fontSize:13,fontWeight:500,
          color: darkMode ? 'rgba(242,238,238,0.9)' : '#1a0505',
          lineHeight:1.9,letterSpacing:0.5,
        }}>
          技术是我的武器，<br/>
          思考是我的利刃，<br/>
          记录是我的轨迹。
        </p>
      </div>

      {/* TAKE YOUR HEART */}
      <div style={{
        position:'absolute',bottom:60,left:12,zIndex:10,
      }}>
        <div style={{
          fontFamily:"'Bebas Neue',sans-serif",
          fontSize:38,
          color:'white',letterSpacing:5,lineHeight:1,
          textShadow:'3px 3px 0 var(--red)',
          display:'block',
        }}>TAKE Y<span style={{color:'var(--red)'}}>O</span>UR HE<span style={{color:'var(--red)'}}>★</span>RT</div>
        <div style={{

                <polygon key={lv} points={polyStr(stats.map(s=>pt(lv,s.angle)))}
                  fill="none"
                  stroke={lv===10?'rgba(255,255,255,0.35)':'rgba(255,255,255,0.1)'}
                  strokeWidth={lv===10?1.5:0.7}/>
              ))}
              {/* Axis lines */}
              {stats.map((s,i)=>{const o=pt(10,s.angle);return(
                <line key={i} x1={cx} y1={cy} x2={o[0]} y2={o[1]}
                  stroke="rgba(255,255,255,0.14)" strokeWidth="0.8"/>
              )})}
              {/* Filled polygon */}
              <polygon points={polyStr(valPts)}
                fill="rgba(200,21,10,0.32)" stroke="rgba(220,30,15,1)" strokeWidth="2.5"/>
              {/* Dots */}
              {valPts.map((p,i)=>(
                <circle key={i} cx={p[0]} cy={p[1]} r="4.5" fill="var(--red)" stroke="white" strokeWidth="1.5"/>
              ))}
              {/* Labels */}
              {stats.map((s,i)=>{
                const lp=labelPt(s.angle);
                const anchor=s.angle>-20&&s.angle<60?'start':s.angle>120&&s.angle<180?'end':'middle';
                return(
                  <g key={i}>
                    <text x={lp[0]} y={lp[1]-5} textAnchor={anchor}
                      fontFamily="'Noto Sans SC',sans-serif" fontWeight="700" fontSize="11.5" fill="white">{s.name}</text>
                    <text x={lp[0]} y={lp[1]+9} textAnchor={anchor}
                      fontFamily="'Share Tech Mono',monospace" fontSize="9" fill="rgba(200,21,10,0.9)">{s.en}  {s.val}</text>
                  </g>
                );
              })}
            </svg>

            {/* Stat descriptions */}
            <div style={{flex:1,display:'flex',flexDirection:'column',gap:8}}>
              {stats.map((s,i)=>(
                <div key={i} style={{display:'flex',gap:10,padding:'7px 10px',

                </div>

            </div>
          </div>
        </div>

        {/* TECH STACK */}
        <div style={{border:'2px solid rgba(255,255,255,0.7)',background:'rgba(5,1,1,0.9)',
          padding:'14px 18px',position:'relative',
          clipPath:'polygon(0 0,100% 0,100% calc(100% - 14px),calc(100% - 14px) 100%,0 100%)'}}>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14,

/* ========= APP ========= */
function App() {
  const [page, setPage] = useState(()=>localStorage.getItem('p5r_page')||'home');
  const [searchOpen, setSearchOpen] = useState(false);
  const [darkMode, setDarkMode] = useState(()=>localStorage.getItem('p5r_dark')!=='false');
  const [tweaksVisible, setTweaksVisible] = useState(false);
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);

  useEffect(()=>{
    localStorage.setItem('p5r_page', page==='home'?'home':page);
  },[page]);
  useEffect(()=>{
    localStorage.setItem('p5r_dark', darkMode);
    document.documentElement.style.setProperty('--red', tweaks.accentColor);
    document.documentElement.style.setProperty('--red2', tweaks.accentColor);
  },[darkMode, tweaks.accentColor]);

  // Tweaks message bridge
  useEffect(()=>{
    const handler = e => {
      if(e.data?.type==='__activate_edit_mode') setTweaksVisible(true);
      if(e.data?.type==='__deactivate_edit_mode') setTweaksVisible(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return ()=>window.removeEventListener('message', handler);
  },[]);

  const updateTweaks = (delta) => {
    const next = {...tweaks,...delta};
    setTweaks(next);
    window.parent.postMessage({type:'__edit_mode_set_keys',edits:next},'*');
    if(delta.accentColor) document.documentElement.style.setProperty('--red', delta.accentColor);
  };

  const isHome = page==='home';

  return (
    <div style={{
      width:'100vw',height:'100vh',overflow:'hidden',
      background: darkMode ? 'var(--bg)' : '#f0e8e5',
      color: darkMode ? 'var(--white)' : '#1a0505',
    }}>
      <Background darkMode={darkMode}/>
      <NavBar currentPage={page} onNav={setPage} searchOpen={searchOpen}
        setSearchOpen={setSearchOpen} darkMode={darkMode} setDarkMode={setDarkMode}/>

      {isHome
        ? <HomePage onNav={setPage} darkMode={darkMode} showChar={tweaks.showCharacter}/>
        : <ContentPage pageId={page} onBack={()=>setPage('home')} darkMode={darkMode}/>
      }

      <Footer darkMode={darkMode}/>
      {searchOpen && <SearchOverlay onClose={()=>setSearchOpen(false)} darkMode={darkMode}/>}
      <TweaksPanel visible={tweaksVisible} values={tweaks} onChange={updateTweaks}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
